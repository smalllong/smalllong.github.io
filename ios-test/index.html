<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    #bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      line-height: 2;
      margin-bottom: env(safe-area-inset-bottom);
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
  <script>
    function log() {
      document.body.insertAdjacentText('afterbegin', 'clicked\n')
    }
  </script>
</head>
<body>
  <button id=bar onclick='log()'> click me </button>
</body>
</html>
